    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 14px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      background: #111;
      border-radius: 8px;
      border: 1px solid #1f1f1f;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .nav-logo svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .nav-link {
      color: #6f6f73;
      text-decoration: none;
      font-size: 15px;
      transition: color 0.2s ease;
    }

    .nav-link:hover { color: #a1a1a6; }

    /* ── CONTENT ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 140px 24px 80px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #6f6f73;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 1px;
      margin: 0 0 8px;
    }

    .meta {
      color: #6f6f73;
      font-size: 14px;
      margin-bottom: 56px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 48px 0 12px;
    }

    p {
      color: #aaa;
      font-size: 15px;
      line-height: 1.7;
      margin: 0 0 16px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 48px 0;
    }

    /* ── FOOTER ── */
    .bottom-links {
      display: flex;
      gap: 14px;
      padding: 28px 36px;
    }

    .bottom-link {
      color: #6f6f73;
      text-decoration: none;
      font-size: 15px;
      transition: color 0.2s ease;
    }

    .bottom-link:hover { color: #a1a1a6; }

    .btn {
      margin-top: 25px;
      padding: 7px 20px;
      background: #000000;
      border-radius: 500px;
      display: block;
      border: 1px solid #000000;
      color: rgb(255, 255, 255);
      cursor: pointer;
      font-size: 15px;
      transition: border-color 0.2s ease;
    }

  <script>

function fetchtoken() {
  const token = document.cookie
    .split("; ")
    .find((row) => row.startsWith("token="))
    ?.split("=")[1];

  return token ? decodeURIComponent(token) : null;
}

const token = fetchtoken();

async function getcompanyid() {
  if (!token) {
    document.getElementById("company-id").textContent = "Not logged in";
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/get-username", {
      headers: { Authorization: `Bearer ${token}` },
    });

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const data = await response.json();
    document.getElementById("company-id").textContent = data.id || "N/A";
  } catch (error) {
    console.error("Error fetching company ID:", error);
    document.getElementById("company-id").textContent = "Error fetching company ID";
  }
}

getcompanyid();

    // placeholders (replace later with backend)
    //document.getElementById("company-id").textContent = "test-corp";

    document.getElementById("origin").textContent = window.location.origin;

    document.getElementById("api-url").textContent = "https://api.wisp.dev";

    function logout() {
      document.cookie = "token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
    }

    async function revoketoken() {
        alert("Error: Token cannot be revoked")
    }



  </script>
