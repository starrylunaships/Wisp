<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(220, 208, 185, 0.75), transparent 35%),
                linear-gradient(180deg, #f4f1ea 0%, #e5dfd2 100%);
            color: #1c1710;
            font-family: "Segoe UI", sans-serif;
        }

        .page-note {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(28, 23, 16, 0.12);
            border-radius: 14px;
            max-width: 280px;
            backdrop-filter: blur(12px);
        }

        .page-note h1 {
            margin: 0 0 8px;
            font-size: 16px;
        }

        .page-note p {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .page-note a {
            color: inherit;
        }
    </style>
</head>
<body>
    <aside class="page-note">
        <h1>Login Step</h1>
        <p>This page hosts the Wisp login widget. When login succeeds, or when a `?token=` from create-account is verified, it forwards you into the protected app.</p>
    </aside>
    <script src="../src/public/login.js"></script>
    <script>
        const wispconfig = "wisp/config.json";

        document.addEventListener("wisp:login-success", () => {
            window.location.replace("./app.html");
        });

        document.addEventListener("wisp:token-verified", () => {
            window.location.replace("./app.html");
        });

        initialisewisp(wispconfig);
    </script>
</body>
</html>
